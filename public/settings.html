<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — AttendAI</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4aa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AttendAI">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><div class="logo-icon">⬡</div>AttendAI</div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a href="dashboard.html" class="sidebar-link"><span class="link-icon">⊞</span> Dashboard</a>
        <a href="attendance.html" class="sidebar-link"><span class="link-icon">✓</span> Mark Attendance</a>
        <a href="report.html" class="sidebar-link"><span class="link-icon">📊</span> Reports</a>
        <div class="sidebar-section-label" id="mgmtLabel">Management</div>
        <a href="students.html" class="sidebar-link" id="studentsNavLink"><span class="link-icon">👤</span> Students</a>
        <a href="faculty.html" class="sidebar-link" id="facultyNavLink"><span class="link-icon">🎓</span> Faculty</a>
        <a href="courses.html" class="sidebar-link" id="coursesNavLink"><span class="link-icon">📚</span> Courses</a>
        <div class="sidebar-section-label">Account</div>
        <a href="settings.html" class="sidebar-link active"><span class="link-icon">⚙</span> Settings</a>
        <a href="#" class="sidebar-link" id="logoutBtn"><span class="link-icon">⏻</span> Logout</a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="userName">Loading…</div>
          <div class="user-role" id="userRole">—</div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <!-- Mobile Menu Toggle -->
      <button class="mobile-menu-btn" id="menuToggle">
        <span class="menu-icon">☰</span> Menu
      </button>
      <div class="page-header">
        <div class="page-header-left">
          <h2>Settings</h2>
          <p>Manage your profile and account preferences</p>
        </div>
      </div>

      <!-- Profile Section -->
      <div class="card mb-24">
        <div class="card-header"><h4>Profile Information</h4></div>
        <form id="profileForm">
          <div class="grid-2" style="gap:14px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">First Name</label>
              <input type="text" id="sFirstName" class="form-input" placeholder="First name">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Last Name</label>
              <input type="text" id="sLastName" class="form-input" placeholder="Last name">
            </div>
          </div>
          <div class="form-group mt-16">
            <label class="form-label">Email</label>
            <input type="email" id="sEmail" class="form-input" disabled>
          </div>
          <div class="grid-2" style="gap:14px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Roll Number</label>
              <input type="text" id="sRollNumber" class="form-input" placeholder="Roll number">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Department</label>
              <select id="sDepartment" class="form-select">
                <option value="">— Select —</option>
                <option>Computer Science</option>
                <option>Electronics & Communication</option>
                <option>Mechanical Engineering</option>
                <option>Civil Engineering</option>
                <option>Business Administration</option>
                <option>Mathematics</option>
                <option>Physics</option>
              </select>
            </div>
          </div>
          <div class="form-group mt-16">
            <label class="form-label">Role</label>
            <input type="text" id="sRole" class="form-input" disabled>
          </div>
          <div id="profileError" class="alert alert-error hidden" style="margin-top:14px;"></div>
          <div id="profileSuccess" class="alert alert-success hidden" style="margin-top:14px;"></div>
          <button type="submit" id="profileSaveBtn" class="btn btn-primary" style="margin-top:14px;">Save Changes</button>
        </form>
      </div>

      <!-- Change Password Section -->
      <div class="card mb-24">
        <div class="card-header"><h4>Change Password</h4></div>
        <form id="passwordForm">
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="newPassword" class="form-input" placeholder="Min. 8 characters" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" required minlength="8">
          </div>
          <div id="pwError" class="alert alert-error hidden"></div>
          <div id="pwSuccess" class="alert alert-success hidden"></div>
          <button type="submit" id="pwSaveBtn" class="btn btn-primary">Update Password</button>
        </form>
      </div>

      <!-- Account Info -->
      <div class="card">
        <div class="card-header"><h4>Account Details</h4></div>
        <div style="display:flex;flex-direction:column;gap:12px;padding:4px 0;">
          <div style="display:flex;justify-content:space-between;">
            <span class="text-muted">Account created</span>
            <span id="acctCreated" style="color:var(--text-primary);">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span class="text-muted">Last updated</span>
            <span id="acctUpdated" style="color:var(--text-primary);">—</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const user = Auth.getUser();
      if (!user) return;

      document.getElementById('userName').textContent = user.name || user.username;
      document.getElementById('userRole').textContent = user.role;
      document.getElementById('userAvatar').textContent = (user.first_name || 'U')[0].toUpperCase();
      document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

      // Role-based sidebar
      if (user.role === 'student') {
        document.getElementById('mgmtLabel').style.display = 'none';
        document.getElementById('studentsNavLink').style.display = 'none';
        document.getElementById('facultyNavLink').style.display = 'none';
        document.getElementById('coursesNavLink').style.display = 'none';
      } else if (user.role === 'faculty') {
        document.getElementById('facultyNavLink').style.display = 'none';
      }

      // Load profile from Supabase
      const sb = getSupabase();
      const { data: profile } = await sb.from('profiles').select('*').eq('user_id', user.id).single();

      if (profile) {
        document.getElementById('sFirstName').value = profile.first_name || '';
        document.getElementById('sLastName').value = profile.last_name || '';
        document.getElementById('sEmail').value = profile.email || '';
        document.getElementById('sRollNumber').value = profile.roll_number || '';
        document.getElementById('sDepartment').value = profile.department || '';
        document.getElementById('sRole').value = user.role || '';
        document.getElementById('acctCreated').textContent = new Date(profile.created_at).toLocaleDateString();
        document.getElementById('acctUpdated').textContent = new Date(profile.updated_at).toLocaleDateString();
      }

      // Save profile
      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errBox = document.getElementById('profileError');
        const successBox = document.getElementById('profileSuccess');
        errBox.classList.add('hidden');
        successBox.classList.add('hidden');

        const btn = document.getElementById('profileSaveBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Saving…';

        try {
          const updates = {
            first_name: document.getElementById('sFirstName').value.trim(),
            last_name: document.getElementById('sLastName').value.trim(),
            roll_number: document.getElementById('sRollNumber').value.trim() || null,
            department: document.getElementById('sDepartment').value || null
          };
          const { error } = await sb.from('profiles').update(updates).eq('user_id', user.id);
          if (error) throw error;

          // Update local user
          user.first_name = updates.first_name;
          user.last_name = updates.last_name;
          user.roll_number = updates.roll_number;
          user.department = updates.department;
          user.name = updates.first_name + ' ' + updates.last_name;
          Auth.setUser(user);

          successBox.textContent = 'Profile updated successfully!';
          successBox.classList.remove('hidden');
          Toast.success('Profile saved!');
        } catch (err) {
          errBox.textContent = err.message || 'Failed to update profile.';
          errBox.classList.remove('hidden');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Save Changes';
        }
      });

      // Change password
      document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errBox = document.getElementById('pwError');
        const successBox = document.getElementById('pwSuccess');
        errBox.classList.add('hidden');
        successBox.classList.add('hidden');

        const newPw = document.getElementById('newPassword').value;
        const confirmPw = document.getElementById('confirmPassword').value;

        if (newPw !== confirmPw) {
          errBox.textContent = 'Passwords do not match.';
          errBox.classList.remove('hidden');
          return;
        }

        const btn = document.getElementById('pwSaveBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Updating…';

        try {
          const { error } = await sb.auth.updateUser({ password: newPw });
          if (error) throw error;
          successBox.textContent = 'Password updated successfully!';
          successBox.classList.remove('hidden');
          document.getElementById('passwordForm').reset();
          Toast.success('Password changed!');
        } catch (err) {
          errBox.textContent = err.message || 'Failed to update password.';
          errBox.classList.remove('hidden');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Update Password';
        }
      });
    });
  </script>
  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <script>
    (function() {
      var btn     = document.getElementById("menuToggle");
      var sidebar = document.querySelector(".sidebar");
      var overlay = document.getElementById("sidebarOverlay");
      function openSidebar()  { sidebar.classList.add("open");    overlay.classList.add("active"); }
      function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("active"); }
      if (btn)     btn.addEventListener("click", openSidebar);
      if (overlay) overlay.addEventListener("click", closeSidebar);
    })();
  </script>
</body>
</html>
