<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management — AttendAI</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4aa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AttendAI">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><div class="logo-icon">⬡</div> AttendAI</div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a href="dashboard.html" class="sidebar-link"><span class="link-icon">⊞</span> Dashboard</a>
        <a href="attendance.html" class="sidebar-link"><span class="link-icon">✓</span> Mark Attendance</a>
        <a href="report.html" class="sidebar-link"><span class="link-icon">📊</span> Reports</a>
        <div class="sidebar-section-label">Management</div>
        <a href="students.html" class="sidebar-link active"><span class="link-icon">👤</span> Students</a>
        <a href="faculty.html" class="sidebar-link" id="facultyLink"><span class="link-icon">🎓</span> Faculty</a>
        <a href="courses.html" class="sidebar-link"><span class="link-icon">📚</span> Courses</a>
        <div class="sidebar-section-label">Account</div>
        <a href="settings.html" class="sidebar-link"><span class="link-icon">⚙</span> Settings</a>
        <a href="#" class="sidebar-link" id="logoutBtn"><span class="link-icon">⏻</span> Logout</a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="userName">Loading…</div>
          <div class="user-role" id="userRole">—</div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <!-- Mobile Menu Toggle -->
      <button class="mobile-menu-btn" id="menuToggle">
        <span class="menu-icon">☰</span> Menu
      </button>
      <div class="page-header">
        <div class="page-header-left">
          <h2>Student Management</h2>
          <p>View, filter, and manage students</p>
        </div>
        <button class="btn btn-primary" id="addStudentBtn">➕ Add Student</button>
      </div>

      <!-- Add Student Form -->
      <div id="addStudentForm" class="card mb-24" style="display:none;">
        <div class="card-header"><h4>Add New Student</h4>
          <button class="btn btn-ghost btn-sm" id="cancelAddBtn">✕ Cancel</button>
        </div>
        <form id="studentForm">
          <div class="grid-2" style="gap:14px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">First Name</label>
              <input type="text" id="sFirstName" class="form-input" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Last Name</label>
              <input type="text" id="sLastName" class="form-input" required>
            </div>
          </div>
          <div class="form-group mt-16">
            <label class="form-label">Email</label>
            <input type="email" id="sEmail" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Roll Number</label>
            <input type="text" id="sRollNumber" class="form-input" placeholder="e.g. 2021CS001">
          </div>
          <div class="form-group">
            <label class="form-label">Department</label>
            <select id="sDepartment" class="form-select">
              <option value="">— Select —</option>
              <option>Computer Science</option>
              <option>Electronics & Communication</option>
              <option>Mechanical Engineering</option>
              <option>Civil Engineering</option>
              <option>Business Administration</option>
              <option>Mathematics</option>
              <option>Physics</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="sPassword" class="form-input" placeholder="Min. 8 characters" required>
          </div>
          <div id="sError" class="alert alert-error hidden"></div>
          <div id="sSuccess" class="alert alert-success hidden"></div>
          <button type="submit" id="sSubmitBtn" class="btn btn-primary">Create Student Account</button>
        </form>
      </div>

      <!-- Filters -->
      <div class="card mb-24">
        <div class="card-header"><h4>Filters</h4></div>
        <div class="grid-3" style="gap:14px;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Department</label>
            <select id="filterDept" class="form-select">
              <option value="">All Departments</option>
              <option>Computer Science</option>
              <option>Electronics & Communication</option>
              <option>Mechanical Engineering</option>
              <option>Civil Engineering</option>
              <option>Business Administration</option>
              <option>Mathematics</option>
              <option>Physics</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Year</label>
            <select id="filterYear" class="form-select">
              <option value="">All Years</option>
              <option>2021</option>
              <option>2022</option>
              <option>2023</option>
              <option>2024</option>
              <option>2025</option>
              <option>2026</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Semester</label>
            <select id="filterSemester" class="form-select">
              <option value="">All Semesters</option>
              <option>1</option><option>2</option><option>3</option><option>4</option>
              <option>5</option><option>6</option><option>7</option><option>8</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Student List -->
      <div class="card">
        <div class="card-header"><h4>Students</h4>
          <span class="badge badge-teal" id="studentCount">—</span>
        </div>
        <div id="studentList">
          <div class="text-center" style="padding:24px;"><span class="spinner"></span></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    let allStudents = [];
    let allEnrollments = [];
    let allCourses = [];

    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const user = Auth.getUser();

      // Only admin and faculty
      if (!user || user.role === 'student') {
        window.location.href = 'dashboard.html';
        return;
      }

      // Hide faculty link for non-admin
      if (user.role !== 'admin') {
        document.getElementById('facultyLink').style.display = 'none';
      }

      document.getElementById('userName').textContent = user.name || user.username;
      document.getElementById('userRole').textContent = user.role;
      document.getElementById('userAvatar').textContent = (user.first_name || 'U')[0].toUpperCase();
      document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

      // Toggle add form
      document.getElementById('addStudentBtn').addEventListener('click', () => {
        document.getElementById('addStudentForm').style.display = '';
      });
      document.getElementById('cancelAddBtn').addEventListener('click', () => {
        document.getElementById('addStudentForm').style.display = 'none';
      });

      // Load data
      await loadAllData();

      // Filter listeners
      document.getElementById('filterDept').addEventListener('change', applyFilters);
      document.getElementById('filterYear').addEventListener('change', applyFilters);
      document.getElementById('filterSemester').addEventListener('change', applyFilters);

      // Add student form
      document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errBox = document.getElementById('sError');
        const successBox = document.getElementById('sSuccess');
        errBox.classList.add('hidden');
        successBox.classList.add('hidden');

        const btn = document.getElementById('sSubmitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Creating…';

        try {
          const resp = await fetch(SUPABASE_URL + '/functions/v1/manage-users', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'apikey': SUPABASE_ANON_KEY
            },
            body: JSON.stringify({
              action: 'create_user',
              email: document.getElementById('sEmail').value.trim(),
              password: document.getElementById('sPassword').value,
              first_name: document.getElementById('sFirstName').value.trim(),
              last_name: document.getElementById('sLastName').value.trim(),
              department: document.getElementById('sDepartment').value,
              roll_number: document.getElementById('sRollNumber').value.trim(),
              role: 'student'
            })
          });
          const result = await resp.json();
          if (result.error) throw new Error(result.error);

          successBox.textContent = 'Student account created!';
          successBox.classList.remove('hidden');
          document.getElementById('studentForm').reset();
          Toast.success('Student added!');
          await loadAllData();
        } catch (err) {
          errBox.textContent = err.message || 'Failed to create student.';
          errBox.classList.remove('hidden');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Create Student Account';
        }
      });
    });

    async function loadAllData() {
      const sb = getSupabase();

      // Get student user IDs
      const { data: studentRoles } = await sb.from('user_roles').select('user_id').eq('role', 'student');
      const studentIds = (studentRoles || []).map(r => r.user_id);

      // Get profiles
      const { data: profiles } = await sb.from('profiles').select('*').in('user_id', studentIds).order('first_name');
      allStudents = profiles || [];

      // Get enrollments & courses for filtering
      const { data: enrollments } = await sb.from('enrollments').select('student_id, course_id');
      allEnrollments = enrollments || [];

      const { data: courses } = await sb.from('courses').select('*');
      allCourses = courses || [];

      applyFilters();
    }

    function applyFilters() {
      const deptFilter = document.getElementById('filterDept').value;
      const yearFilter = document.getElementById('filterYear').value;
      const semesterFilter = document.getElementById('filterSemester').value;

      let filtered = [...allStudents];

      // Filter by department
      if (deptFilter) {
        filtered = filtered.filter(s => s.department === deptFilter);
      }

      // Filter by year/semester via enrollments+courses
      if (yearFilter || semesterFilter) {
        // Find matching courses
        let matchingCourses = [...allCourses];
        if (yearFilter) matchingCourses = matchingCourses.filter(c => c.year == yearFilter);
        if (semesterFilter) matchingCourses = matchingCourses.filter(c => c.semester === semesterFilter);
        const matchingCourseIds = new Set(matchingCourses.map(c => c.id));

        // Find students enrolled in matching courses
        const enrolledStudentIds = new Set(
          allEnrollments.filter(e => matchingCourseIds.has(e.course_id)).map(e => e.student_id)
        );

        filtered = filtered.filter(s => enrolledStudentIds.has(s.user_id));
      }

      renderStudents(filtered);
    }

    function renderStudents(students) {
      const container = document.getElementById('studentList');
      document.getElementById('studentCount').textContent = students.length;

      if (students.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;"><p style="color:var(--text-muted);font-size:1.1rem;">📭 No data found</p><p style="color:var(--text-muted);font-size:.85rem;margin-top:8px;">No students match the selected filters.</p></div>';
        return;
      }

      container.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>Email</th>
                <th>Department</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${students.map(s => `
                <tr>
                  <td style="color:var(--text-primary);font-weight:500;">${esc(s.first_name) || ''} ${esc(s.last_name) || ''}</td>
                  <td><span class="badge badge-teal">${esc(s.roll_number) || '—'}</span></td>
                  <td>${esc(s.email)}</td>
                  <td>${esc(s.department) || '—'}</td>
                  <td>
                    <button class="btn btn-danger btn-sm delete-student-btn" data-id="${s.user_id}" data-name="${esc(s.first_name)} ${esc(s.last_name)}">
                      🗑 Remove
                    </button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      // Delete handlers
      document.querySelectorAll('.delete-student-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const userId = btn.dataset.id;
          if (!confirm(`Remove student "${name}"? This cannot be undone.`)) return;

          btn.disabled = true;
          btn.innerHTML = '<span class="spinner"></span>';
          try {
            const resp = await fetch(SUPABASE_URL + '/functions/v1/manage-users', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                'apikey': SUPABASE_ANON_KEY
              },
              body: JSON.stringify({ action: 'delete_user', user_id: userId })
            });
            const result = await resp.json();
            if (result.error) throw new Error(result.error);
            Toast.success('Student removed.');
            await loadAllData();
          } catch (err) {
            Toast.error(err.message || 'Failed to remove student.');
            btn.disabled = false;
            btn.innerHTML = '🗑 Remove';
          }
        });
      });
    }
  </script>
  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <script>
    (function() {
      var btn     = document.getElementById("menuToggle");
      var sidebar = document.querySelector(".sidebar");
      var overlay = document.getElementById("sidebarOverlay");
      function openSidebar()  { sidebar.classList.add("open");    overlay.classList.add("active"); }
      function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("active"); }
      if (btn)     btn.addEventListener("click", openSidebar);
      if (overlay) overlay.addEventListener("click", closeSidebar);
    })();
  </script>
</body>
</html>
